name: Continuous Integration & Deployment Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ─── FRONTEND WORKFLOW ──────────────────────────────────────────────────
      - name: Cache Frontend Node Modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      # ─── BACKEND WORKFLOW ───────────────────────────────────────────────────
      - name: Cache Backend Node Modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-backend-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Lint Backend
        working-directory: ./backend
        run: npm run lint --if-present

      - name: Test Backend
        working-directory: ./backend
        run: npm run test --if-present

      - name: Build Backend
        working-directory: ./backend
        run: npm run build --if-present

      # ─── REALTIME-SERVICE WORKFLOW ──────────────────────────────────────────
      - name: Cache Realtime Service Node Modules
        uses: actions/cache@v4
        with:
          path: realtime-service/node_modules
          key: ${{ runner.os }}-realtime-${{ hashFiles('realtime-service/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-realtime-

      - name: Install Realtime Service Dependencies
        working-directory: ./realtime-service
        run: npm ci

      - name: Lint Realtime Service
        working-directory: ./realtime-service
        run: npm run lint --if-present

      - name: Test Realtime Service
        working-directory: ./realtime-service
        run: npm run test

      - name: Build Realtime Service
        working-directory: ./realtime-service
        run: npm run build

      # ─── DOCKER IMAGE BUILD ──────────────────────────────────────────────────
      - name: Build Backend Docker Image
        run: docker build -t backend-image ./backend

      - name: Build Realtime Service Docker Image
        run: docker build -t realtime-image ./realtime-service

      - name: Build Frontend Docker Image
        run: docker build -t frontend-image ./frontend

      # ─── DOCKER IMAGE VERIFICATION (SMOKE TESTS) ────────────────────────────
      - name: Create Test Network
        run: docker network create test-net

      - name: Start MongoDB for Smoke Tests
        run: docker run -d --name test_db --network test-net -p 27017:27017 mongo:6.0

      - name: Verify Backend Image
        run: |
          docker run -d --name temp_backend --network test-net -p 5005:5005 -e PORT=5005 -e NODE_ENV=production -e JWT_SECRET=mock_secret -e MONGODB_URI=mongodb://test_db:27017/mock backend-image
          sleep 5
          curl -f http://localhost:5005/api/health || (docker logs temp_backend && exit 1)
          docker stop temp_backend && docker rm temp_backend

      - name: Verify Realtime Service Image
        run: |
          docker run -d --name temp_realtime --network test-net -p 5006:5006 -e PORT=5006 -e NODE_ENV=production -e JWT_SECRET=mock_secret -e MONGODB_URI=mongodb://test_db:27017/mock realtime-image
          sleep 5
          curl -f http://localhost:5006/health || (docker logs temp_realtime && exit 1)
          docker stop temp_realtime && docker rm temp_realtime

      - name: Verify Frontend Image
        run: |
          docker run -d --name temp_frontend -p 8080:80 frontend-image
          sleep 5
          curl -f http://localhost:8080/health || (docker logs temp_frontend && exit 1)
          docker stop temp_frontend && docker rm temp_frontend

      - name: Cleanup Test Infrastructure
        if: always()
        run: |
          docker stop test_db || true
          docker rm test_db || true
          docker network rm test-net || true
