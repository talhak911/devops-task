version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: task-manager-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task-manager-backend
    restart: unless-stopped
    ports:
      - "5005:5005"
    env_file:
      - ./backend/.env.development
    environment:
      - NODE_ENV=development
      - PORT=5005
      - MONGODB_URI=mongodb://mongodb:27017/teacommerce
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5005/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  realtime-service:
    build:
      context: ./realtime-service
      dockerfile: Dockerfile
    container_name: task-manager-realtime
    restart: unless-stopped
    ports:
      - "5006:5006"
    env_file:
      - ./realtime-service/.env.development
    environment:
      - NODE_ENV=development
      - PORT=5006
      - MONGODB_URI=mongodb://mongodb:27017/teacommerce
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5006/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: task-manager-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
      realtime-service:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mongo_data:

networks:
  app-network:
    driver: bridge
